---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%Y年%m月%d日" }}
    {% if page.category %} · {{ page.category }}{% endif %}
    {% if page.tags %} · {{ page.tags | join: ", " }}{% endif %}
  </div>

  {{ content }}

  <a href="{{ site.baseurl }}/" class="back-link">← 返回首页</a>
</article>
